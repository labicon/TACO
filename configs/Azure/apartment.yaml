inherit_from: configs/Azure/azure.yaml
mapping:
  bound: [[-1.5,3.5],[-4.5,3.6],[-6.5,8.]]
  marching_cubes_bound: [[-1.5,3.5],[-4.5,3.6],[-6.5,8.]]
  keyframe_every: 1
  map_every: 1
  enable_replay: True
  mem_log_every: 20
  

mesh: 
  render_color: True
  vis: 50  

training:
  ewc_enabled: False
  ewc_lambda: 0.1
  temporal_consensus:
    enabled: False
    K: 1
    frames_per_task: 1
    inject_every: 1
    gamma: 0.2   


data:
  datadir: data/Azure/Apartment
  trainskip: 1
  output: output/Azure/Apartment
  exp_name: Normal
  load_path: fixed_decoder.pt


tracking:
  gt_pose: True


multi_agents:
  num_agents: 1
  complete_graph: True
  #edges_list: [[0,1], [0,2], [1,2]]
  #edges_for_dropout: [ [0,1,0.99], [0,2,0.99], [1,2,0.99] ] # [node i, node j, possibility of dropping out]
  edges_for_dropout: []
  distributed_algorithm: 'AUQ_CADMM'
  rho: 0.0001
  track_uncertainty: True
  fix_decoder: True
  alpha: 0.15 # DSGD
  #alpha: 0.05 # DSGT

edge_based: True

