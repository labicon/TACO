inherit_from: configs/Replica/replica.yaml
mapping:
  bound: [[-1.0,6.1],[-3.4,1.9],[-3.1,0.8]]
  marching_cubes_bound: [[-0.9,6.0],[-3.3,1.8],[-3.0,0.7]]
  keyframe_every: 1
  map_every: 1
  enable_replay: False
  mem_log_every: 20


mesh: 
  render_color: True
  vis: 60  


training:

  ewc_enabled: False
  ewc_lambda: 30

  mas_enabled: True
  mas:
    lambda: 1
    frames_per_task: 1

  mas_original_enabled: False
  mas_original:
    lambda: 1
    frames_per_task: 100
    buffer_size: 10

  kr_enabled: False
  kr:
    buffer_size: 10
    save_every: 20
    num_replay_rays: 256

  cnm_enabled: False
  cnm:
    buffer_size: 200000
    pts_per_frame: 2000
    batch_size_zero: 2048
    batch_size_off: 4096
    weight_zero: 1.0
    weight_sign: 0.01
    alpha: 5
    update_freq: 20
    epsilon: 0.05

  unikd_enabled: False  # Set to True to enable
  unikd:
    frames_per_task: 100      # Update teacher every n frames
    uncertainty_threshold: 0.05 # Threshold to filter teacher's bad predictions
    n_random_poses: 20        # Number of random poses to sample per distillation step
    eta: 0.1                  # Margin parameter in loss
    beta_min: 0.05            # Minimum uncertainty value

  temporal_consensus:
    enabled: False
    K: 1
    frames_per_task: 1
    inject_every: 1
    gamma: 1
    uncertainty_decay: 1 
    mask_threshold: 1e-4

data:
  datadir: data/Replica/room2
  trainskip: 1
  output: output/Replica/room2
  exp_name: Online_MAS
  load_path: fixed_decoder.pt


tracking:
  gt_pose: True


multi_agents:
  num_agents: 1
  complete_graph: True
  #edges_list: [[0,1], [0,2], [1,2]]
  #edges_for_dropout: [ [0,1,0.5], [0,2,0.5], [1,2,0.5] ] # [node i, node j, possibility of dropping out]
  edges_for_dropout: []
  distributed_algorithm: 'AUQ_CADMM'
  rho: 0.005
  track_uncertainty: True
  fix_decoder: True
  alpha: 0.9 # DSGD
  #alpha: 0.10 # DSGT

edge_based: True