inherit_from: configs/Replica/replica.yaml
mapping:
  bound: [[-3.6,3.2],[-3.0,5.5],[-1.4,1.7]]
  marching_cubes_bound: [[-3.5,3.1],[-2.9,5.4],[-1.3,1.6]]
  keyframe_every: 1
  map_every: 1
  enable_replay: False
  mem_log_every: 20
  

mesh: 
  render_color: True
  vis: 50  

training:
  ewc_enabled: False
  ewc_lambda: 0.1
  temporal_consensus:
    enabled: False
    K: 1
    frames_per_task: 1
    inject_every: 1
    gamma: 1   


data:
  datadir: data/Replica/office2
  trainskip: 1
  output: output/Replica/office2
  exp_name: None
  load_path: fixed_decoder.pt


tracking:
  gt_pose: True


multi_agents:
  num_agents: 1
  complete_graph: True
  #edges_list: [[0,1], [0,2], [1,2]]
  #edges_for_dropout: [ [0,1,0.99], [0,2,0.99], [1,2,0.99] ] # [node i, node j, possibility of dropping out]
  edges_for_dropout: []
  distributed_algorithm: 'AUQ_CADMM'
  rho: 0.0001
  track_uncertainty: True
  fix_decoder: True
  alpha: 0.15 # DSGD
  #alpha: 0.05 # DSGT

edge_based: True

