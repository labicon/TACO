inherit_from: configs/Replica/replica.yaml
mapping:
  bound: [[-4.4,6.34],[-1,6.6],[-6.6,9.9]]
  marching_cubes_bound: [[-3.9,5.9],[-0.2,6.1],[-6.1,9.4]]
  keyframe_every: 1
  map_every: 1
  enable_replay: True
  mem_log_every: 20


mesh: 
  render_color: True
  vis: 60  

cam:
  H: 480
  W: 640
  fx: 320.000000
  fy: 320.000000
  cx: 319.500000
  cy: 239.500000
  png_depth_scale: 1000.000000
  crop_edge: 0
  near: 0.010000
  far: 10.000000
  depth_trunc: 10.000000

training:

  ewc_enabled: False
  ewc_lambda: 30

  mas_enabled: False
  mas:
    lambda: 1
    frames_per_task: 1

  mas_original_enabled: False
  mas_original:
    lambda: 1
    frames_per_task: 100
    buffer_size: 10

  kr_enabled: False
  kr:
    buffer_size: 10
    save_every: 20
    num_replay_rays: 256

  cnm_enabled: False
  cnm:
    buffer_size: 200000
    pts_per_frame: 2000
    batch_size_zero: 2048
    batch_size_off: 4096
    weight_zero: 1.0
    weight_sign: 0.01
    alpha: 5
    update_freq: 20
    epsilon: 0.05

  unikd_enabled: False
  unikd:
    frames_per_task: 100
    uncertainty_threshold: 0.05
    n_random_poses: 20
    eta: 0.1
    beta_min: 0.05

  temporal_consensus:
    enabled: False
    K: 1
    frames_per_task: 1
    inject_every: 1
    mask_threshold: 1e-4

data:
  datadir: data/Replica/apt1
  trainskip: 1
  output: output/Replica/apt1
  exp_name: Normal
  load_path: fixed_decoder.pt


tracking:
  gt_pose: True


multi_agents:
  num_agents: 1
  complete_graph: True
  edges_for_dropout: []
  distributed_algorithm: 'AUQ_CADMM'
  rho: 0.005
  track_uncertainty: True
  fix_decoder: True
  alpha: 0.9

edge_based: True
