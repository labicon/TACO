inherit_from: configs/Replica/replica.yaml
mapping:
  bound: [[-5.6,1.4],[-3.2,2.8],[-1.6,1.8]]
  marching_cubes_bound: [[-5.6,1.4],[-3.2,2.8],[-1.6,1.8]]
  keyframe_every: 1
  map_every: 1
  enable_replay: False
  mem_log_every: 20


mesh: 
  render_color: True
  vis: 60  


training:
  ewc_enabled: False
  ewc_lambda: 0.1
  temporal_consensus:
    enabled: False
    K: 1
    frames_per_task: 1
    inject_every: 1
    gamma: 0.2

data:
  datadir: data/Replica/room1
  trainskip: 1
  output: output/Replica/room1
  exp_name: None_test3
  load_path: fixed_decoder.pt


tracking:
  gt_pose: True


multi_agents:
  num_agents: 1
  complete_graph: True
  #edges_list: [[0,1], [0,2], [1,2]]
  #edges_for_dropout: [ [0,1,0.5], [0,2,0.5], [1,2,0.5] ] # [node i, node j, possibility of dropping out]
  edges_for_dropout: []
  distributed_algorithm: 'AUQ_CADMM'
  rho: 0.001
  track_uncertainty: True
  fix_decoder: True
  alpha: 0.9 # DSGD
  #alpha: 0.10 # DSGT

edge_based: True